<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI生成测试</title>
</head>
<body>

<p>AI生成（输入一句话）：</p >
<input id="prompt" placeholder="例如：2000轴分中，安全50">
<button onclick="aiGenerate()">AI生成程序</button>

<div id="result" style="margin-top:20px; white-space: pre-wrap; border:1px solid #ccc; padding:10px;"></div>

<script>
async function aiGenerate() {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) {
        alert("请输入内容！");
        return;
    }
    try {
        let res = await fetch("/api/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt
            })
        });

        let data = await res.json();
console.log("返回数据:", data);
        // 👉 如果后端返回错误
        if (data.error) {
            alert("API返回错误: " + JSON.stringify(data));
            return;
        }

        // 👉 解析AI返回内容
        let result = data.choices?.[0]?.message?.content;

        if (!result) {
            alert("解析失败: " + JSON.stringify(data));
            return;
        }

        document.getElementById("output").value = result;

    } catch (err) {
        alert("请求失败: " + err.message);
    }
}
    document.getElementById("result").innerText = "正在生成，请稍等…";

    try {
        const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        if (!response.ok) {
            const errText = await response.text();
            console.error("请求错误:", errText);
            document.getElementById("result").innerText = "调用失败，请查看控制台！";
            return;
        }

        const data = await response.json();
        console.log("API返回数据:", data);

        // 自动获取生成文本，兼容新版 OpenAI JSON
        let outputText = "";
        if (data.output_text) {
            outputText = data.output_text;
        } else if (data.output && data.output.length > 0) {
            outputText = data.output.map(o =>
                o.content.map(c => c.text).join("")
            ).join("\n");
        } else if (data.error) {
            outputText = "API返回错误: " + data.error;
        } else {
            outputText = "无返回内容";
        }

        document.getElementById("result").innerText = outputText;

    } catch (err) {
        console.error("请求异常:", err);
        document.getElementById("result").innerText = "调用异常，请查看控制台！";
    }
}
</script>

</body>
</html>
